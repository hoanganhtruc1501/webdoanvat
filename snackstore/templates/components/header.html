{% load static %}
<link rel="stylesheet" href="{% static 'css/header.css' %}" />
<header class="header">
  <div class="header-container">
    <!-- Logo Section -->
    <a href="{% url 'snacks:list' %}" class="logo">
      <div class="logo-icon"></div>
      <span class="logo-text">SNACK</span>
    </a>

    <!-- Navigation Menu -->
    <!-- <nav>
                    <ul class="nav-menu">
                        <li><a href="{% url 'snacks:list' %}" class="{% if request.resolver_match.url_name == 'list' %}active{% endif %}">Trang chủ</a></li>
                        <li><a href="#">Blog</a></li>
                        <li><a href="#">Liên hệ</a></li>
                    </ul>
                </nav> -->

    <!-- Header Right Section -->
    <div class="header-right">
      <!-- User Authentication -->
      <div class="user-auth">
        {% if user.is_authenticated %}
        <div class="user-dropdown">
          <span class="user-greeting" onclick="toggleDropdown()">
            Xin chào,
            <strong>{{ user.first_name|default:user.username }}!</strong>
            <i class="fas fa-chevron-down dropdown-arrow"></i>
          </span>
          <div class="dropdown-menu" id="userDropdown">
            {% if user.is_staff %}
            <a href="{% url 'snacks:admin_dashboard' %}" class="dropdown-item">
              <i class="fas fa-tachometer-alt"></i> Dashboard Admin
            </a>
            <a href="/admin/" class="dropdown-item">
              <i class="fas fa-cog"></i> Quản trị Django
            </a>
            {% endif %}
            <a href="{% url 'orders:list'%}" class="dropdown-item">
              <i class="fas fa-shopping-cart"></i> Đơn mua
            </a>
            <a href="{% url 'snacks:logout' %}" class="dropdown-item">
              <i class="fas fa-sign-out-alt"></i> Đăng xuất
            </a>
          </div>
        </div>
        {% else %}
        <a href="{% url 'snacks:login' %}" class="auth-btn login-btn">
          <i class="fas fa-sign-in-alt"></i> Đăng nhập
        </a>
        <a href="{% url 'snacks:register' %}" class="auth-btn register-btn">
          <i class="fas fa-user-plus"></i> Đăng ký
        </a>
        {% endif %}
      </div>

      <!-- Shopping Cart Icon -->
      <a href="{% url 'cart:detail' %}" class="icon-btn cart-link">
        <i class="fa fa-shopping-bag"></i>
        <span class="badge cart-count-badge">{{ cart_count|default:0 }}</span>
      </a>
    </div>
  </div>
</header>

<script>
  function toggleDropdown() {
    const dropdown = document.getElementById("userDropdown");
    dropdown.classList.toggle("show");
  }

  // Close dropdown when clicking outside
  window.onclick = function (event) {
    if (
      !event.target.matches(".user-greeting") &&
      !event.target.matches(".dropdown-arrow")
    ) {
      const dropdown = document.getElementById("userDropdown");
      if (dropdown.classList.contains("show")) {
        dropdown.classList.remove("show");
      }
    }
  };
</script>
